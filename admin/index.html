<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Air Note — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- loading -->
<div id="view-loading" class="center-screen">
  <div class="spinner" aria-label="Loading"></div>
</div>

<!-- login -->
<div id="view-login" class="center-screen hidden">
  <div class="login-card">
    <div class="brand-mark">Air Note</div>
    <h1 class="login-title">Admin</h1>
    <form id="login-form">
      <label class="field">
        <span>Email</span>
        <input id="f-email" type="email" autocomplete="email" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input id="f-pass" type="password" autocomplete="current-password" required>
      </label>
      <button id="login-submit" type="submit" class="btn-primary">Log in</button>
    </form>
    <button id="toggle-mode" class="link-btn">Need an account? Sign up</button>
    <div id="auth-msg" class="auth-msg hidden"></div>
    <button id="back-home" class="link-btn subtle">← Back to site</button>
  </div>
</div>

<!-- app -->
<div id="view-app" class="hidden">
  <aside class="sidebar">
    <div class="side-brand">Air Note <span class="side-badge">Admin</span></div>
    <nav class="side-nav">
      <div class="nav-group">
        <a class="nav-item" href="#/home"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></span> Home</a>
        <a class="nav-item" href="#/users"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5"/><path d="M16 5.2a3.5 3.5 0 0 1 0 5.6"/><path d="M17.8 15.4c1.9.7 3.2 2.2 3.7 4.6"/></svg></span> Users</a>
        <a class="nav-item" href="#/analytics"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M11 20V4"/><path d="M18 20v-8"/></svg></span> User analytics</a>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Coming soon</div>
        <span class="nav-item disabled">Revenue <em class="soon">soon</em></span>
        <span class="nav-item disabled">WhatsApp agent <em class="soon">soon</em></span>
        <span class="nav-item disabled">Claude / MCP <em class="soon">soon</em></span>
        <span class="nav-item disabled">Notifications <em class="soon">soon</em></span>
        <span class="nav-item disabled">Settings <em class="soon">soon</em></span>
      </div>
    </nav>
    <div class="side-foot">
      <div class="who-row">
        <span id="who-avatar" class="avatar">A</span>
        <div id="who" class="who">admin</div>
      </div>
      <button id="sign-out" class="link-btn subtle">Sign out</button>
    </div>
  </aside>
  <main id="main" class="content"></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
